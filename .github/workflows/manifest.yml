name: Generate manifest

on:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build-manifest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate manifest
        run: |
          echo '{"files": [' > manifest.json
          find . -type f \
            ! -path "./.git/*" \
            ! -path "./.github/*" \
            ! -name "manifest.json" \
            | sed 's|^\./||' \
            | sed 's/.*/"&"/' \
            | paste -sd, - >> manifest.json
          echo ']}' >> manifest.json

      - name: Commit manifest
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add manifest.json
          git diff --cached --quiet || git commit -m "Auto-update manifest"
          git push